apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: booking-engine
data:
  DATABASE_HOST: "postgres-svc"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "booking_engine"
  DATABASE_USER: "postgres"
  DATABASE_URL: "postgresql://postgres:$(DATABASE_PASSWORD)@postgres-svc:5432/booking_engine"
  JWT_SECRET_NAME: "app-secrets"
  STRIPE_SECRET_KEY_NAME: "app-secrets"
  STRIPE_WEBHOOK_SECRET_NAME: "app-secrets"
  SKIP_WEBHOOK_SIGNATURE: "false"
  NODE_ENV: "production"
  PORT: "5000"
  VITE_STRIPE_PUBLISHABLE_KEY: "pk_live_placeholder"
  VITE_API_BASE_URL: "/api"
