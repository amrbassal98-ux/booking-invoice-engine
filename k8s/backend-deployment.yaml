apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: booking-engine
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-engine
      component: backend
  template:
    metadata:
      labels:
        app: booking-engine
        component: backend
    spec:
      containers:
        - name: backend
          image: booking-engine-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: SKIP_WEBHOOK_SIGNATURE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SKIP_WEBHOOK_SIGNATURE
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DATABASE_PASSWORD)@postgres-svc:5432/booking_engine"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: STRIPE_WEBHOOK_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
