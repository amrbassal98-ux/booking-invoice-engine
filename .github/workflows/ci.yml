name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test_db
      JWT_SECRET: ci-test-jwt-secret-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SKIP_WEBHOOK_SIGNATURE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Bootstrap database schema
        run: psql "$DATABASE_URL" -f backend/src/__tests__/schema.sql

      - name: Start backend server
        working-directory: backend
        run: node server.js &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ env.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ env.STRIPE_WEBHOOK_SECRET }}
          SKIP_WEBHOOK_SIGNATURE: ${{ env.SKIP_WEBHOOK_SIGNATURE }}
          PORT: "5000"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && break
            sleep 1
          done

      - name: Run integration tests
        working-directory: backend
        run: npm test

      - name: Run Stripe webhook mock tests
        working-directory: backend
        run: node src/__tests__/stripe-webhook-mock.test.js

      - name: Run concurrency stress test
        working-directory: backend
        run: node src/__tests__/booking-concurrency-stress.test.js
